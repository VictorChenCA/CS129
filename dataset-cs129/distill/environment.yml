name: distilling_step_by_step
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  # PyTorch with CUDA support (for GPU training/inference)
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1
  # Core ML/AI libraries
  - transformers
  - datasets
  - peft
  - accelerate
  - safetensors
  - tokenizers
  - huggingface_hub
  # Data processing
  - numpy
  - pandas
  - pyarrow
  - tqdm
  # Utilities
  - pyyaml
  - regex
  - requests
  # Pip packages (installed after conda packages)
  - pip
  - pip:
    - google-cloud-storage
    - matplotlib
